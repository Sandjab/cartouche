# Publish a tagged release to PyPI via OIDC Trusted Publishing.
#
# Untrusted-input handling: the only `${{ ... }}` expressions used in
# `run:` steps are `github.token` and `github.ref_name`, both of which
# are passed through `env:` and quoted properly — no commit messages,
# PR titles, or other attacker-controlled fields are interpolated.
#
# Trigger: push of a tag matching `v*` (e.g. `git tag v0.2.0 && git push --tags`).
#
# This workflow does NOT use a long-lived PyPI API token. It exchanges
# the GitHub Actions OIDC token for a short-lived PyPI credential.
# Before this can run successfully, the project must be configured on
# PyPI as a trusted publisher:
#
#   1. Create the project at https://pypi.org/manage/account/publishing/
#      (or claim it after a first manual upload).
#   2. Add a trusted publisher with:
#        - PyPI project name : cartouche-svg
#        - Owner             : Sandjab
#        - Repository        : cartouche
#        - Workflow filename : release.yml
#        - Environment       : pypi
#   3. In this repo's Settings -> Environments, create an environment
#      called `pypi` (no secrets needed; OIDC handles auth).
#
# The wheel + sdist are validated by the CI's build-wheel job on every
# push, so by the time a tag is created, packaging is already known
# good. This workflow re-builds them from the tagged commit and ships.

name: Publish to PyPI

on:
  push:
    tags:
      # Restrict the trigger to tags that *look like* `vMAJOR.MINOR.PATCH`.
      # GitHub Actions globs can't express "all-digits" precisely, so a
      # second strict-semver check runs as the first step of the build job.
      - "v*.*.*"

# Defense in depth: default everything to read-only, then re-grant only
# the specific permissions each job needs (id-token for OIDC publish,
# contents: write for the GH release).
permissions:
  contents: read

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag is strict semver
        # Reject tags like `v0.2.0-evil`, `vfoo`, `v1`, etc. The trigger
        # glob (`v*.*.*`) is permissive; this step is the actual gate.
        # SemVer 2.0.0 grammar: MAJOR.MINOR.PATCH plus optional
        # `-prerelease` and `+build` segments using `[0-9A-Za-z.-]`.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error title=Invalid tag::Tag '$TAG' is not strict semver. Refusing to publish."
            exit 1
          fi
          echo "Tag '$TAG' is valid semver — proceeding."

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify packaged resources are present in wheel
        run: |
          set -e
          wheel=$(ls dist/cartouche_svg-*.whl | head -1)
          contents=$(python -m zipfile -l "$wheel")
          for f in cartouche/lang/en.json cartouche/lang/fr.json \
                   cartouche/watermarks/davinci.png \
                   cartouche/watermarks/floral.png \
                   cartouche/watermarks/kawai.png; do
            echo "$contents" | grep -q "$f" || { echo "MISSING in wheel: $f"; exit 1; }
          done

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cartouche-svg
    permissions:
      id-token: write  # required for OIDC -> PyPI exchange
    steps:
      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release with built artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --generate-notes
