# CI for Cartouche.
#
# No untrusted inputs are interpolated into `run:` steps — the only
# `${{ ... }}` expression used is `matrix.python-version`, which is a
# literal value defined by this file itself.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest

  build-wheel:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify packaged resources (lang JSON + watermark PNG)
        run: |
          set -e
          wheel=$(ls dist/cartouche_svg-*.whl | head -1)
          echo "Inspecting $wheel"
          contents=$(python -m zipfile -l "$wheel")
          echo "$contents"
          for f in cartouche/lang/en.json cartouche/lang/fr.json \
                   cartouche/watermarks/davinci.png \
                   cartouche/watermarks/floral.png \
                   cartouche/watermarks/kawai.png; do
            echo "$contents" | grep -q "$f" || { echo "MISSING in wheel: $f"; exit 1; }
          done

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
