# Render Cartouche's own repo dashboard and commit it to assets/.
#
# Cartouche dogfoods itself: this workflow uses the in-tree code (pip install .)
# rather than the PyPI package, so any change to src/cartouche/** that lands on
# main will be reflected in the next scheduled render.
#
# In README.md, embed the result with:
#
#     <picture>
#       <source media="(prefers-color-scheme: dark)" srcset="assets/dashboard-dark.svg">
#       <img src="assets/dashboard-light.svg" alt="Cartouche dashboard">
#     </picture>

name: Cartouche · repo dashboard

on:
  schedule:
    # Every 6 hours.
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/dashboard.yml"
      - "src/cartouche/**"
      - "pyproject.toml"

permissions:
  contents: write   # required to commit the regenerated SVG

concurrency:
  group: cartouche-dashboard
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install Cartouche (from checkout)
        run: pip install .

      - name: Render light + dark variants
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p assets
          cartouche repo "$REPO" \
            --theme blueprint-light \
            --out assets/dashboard-light.svg
          cartouche repo "$REPO" \
            --theme blueprint-dark \
            --out assets/dashboard-dark.svg

      - name: Commit if changed
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z $(git status --porcelain assets/) ]]; then
            echo "No dashboard changes."
            exit 0
          fi

          git config user.name "cartouche-bot"
          git config user.email "cartouche-bot@users.noreply.github.com"

          # This workflow has 3 triggers (cron, dispatch, push) and a
          # concurrency group that queues runs rather than cancelling them.
          # That means main can advance between this run's checkout and its
          # push — e.g. a queued workflow_dispatch that started 30 min after
          # being triggered sees an outdated origin/main. The naive push then
          # fails with "rejected — fetch first".
          #
          # Recover by re-syncing onto origin/main and re-applying the freshly
          # rendered SVGs (we don't care about the discarded commit's identity,
          # only about its contents). Bail out if a concurrent run already
          # pushed an equivalent dashboard.
          result=""
          for attempt in 1 2 3; do
            git add assets/
            git commit -m "chore(cartouche): refresh repo dashboard"
            if git push; then
              result="pushed"
              break
            fi

            echo "Push attempt $attempt rejected; resyncing with origin/main."
            cp assets/dashboard-light.svg "$RUNNER_TEMP/dashboard-light.svg"
            cp assets/dashboard-dark.svg  "$RUNNER_TEMP/dashboard-dark.svg"
            git fetch origin main
            git reset --hard origin/main
            mkdir -p assets
            mv "$RUNNER_TEMP/dashboard-light.svg" assets/dashboard-light.svg
            mv "$RUNNER_TEMP/dashboard-dark.svg"  assets/dashboard-dark.svg

            if [[ -z $(git status --porcelain assets/) ]]; then
              echo "origin/main already has an equivalent dashboard; nothing to push."
              result="noop"
              break
            fi
          done

          case "$result" in
            pushed)
              # Purge jsDelivr edge for the README hero. Without this the CDN
              # serves the previous SVG for up to s-maxage=12h, so half of our
              # 6-hourly refreshes would be invisible to README visitors.
              for variant in light dark; do
                curl -fsS "https://purge.jsdelivr.net/gh/${REPO}@main/assets/dashboard-${variant}.svg" || true
              done

              # Purge GitHub's Camo proxy too. Camo sits between every README
              # visitor and jsDelivr, with its own Varnish cache (s-maxage=12h)
              # keyed on the source URL — so jsDelivr being fresh is not enough.
              # Camo accepts an undocumented PURGE verb that returns
              # {"status":"ok"} and invalidates the entry on the receiving edge.
              # The Camo URL contains a server-side hash we can't reconstruct,
              # so we scrape it from the rendered README HTML. Endpoint is
              # undocumented; `|| true` keeps CI green if it disappears.
              readme_html=$(gh api -H "Accept: application/vnd.github.html" "repos/${REPO}/readme" 2>/dev/null || true)
              for variant in light dark; do
                target="https://cdn.jsdelivr.net/gh/${REPO}@main/assets/dashboard-${variant}.svg"
                hex=$(printf '%s' "$target" | xxd -p -c 256 | tr -d '\n')
                camo_url=$(printf '%s' "$readme_html" | grep -oE "https://camo\.githubusercontent\.com/[a-f0-9]+/${hex}" | head -n1)
                if [[ -n "$camo_url" ]]; then
                  curl -fsS -X PURGE "$camo_url" || true
                else
                  echo "::warning::Camo URL for dashboard-${variant} not found in rendered README"
                fi
              done
              ;;
            noop)
              ;;
            *)
              echo "::error::Failed to push dashboard refresh after 3 attempts."
              exit 1
              ;;
          esac
