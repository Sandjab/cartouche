# Example: render a Cartouche profile dashboard.
#
# Drop this in `.github/workflows/dashboard.yml` of your *profile repo*
# (the special repo named `<yourhandle>/<yourhandle>` that backs your
# GitHub profile README). It runs every 12 hours and refreshes a
# profile-wide dashboard with cumulative stars, top-5 repos, and the
# 53-week contribution heatmap.
#
# In your profile README, embed the result with:
#
#     <picture>
#       <source media="(prefers-color-scheme: dark)" srcset="assets/profile-dark.svg">
#       <img src="assets/profile-light.svg" alt="Cartouche profile dashboard">
#     </picture>

name: Cartouche · profile dashboard

on:
  schedule:
    # Twice a day is enough — profile aggregates change slowly.
    - cron: "0 6,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cartouche-profile
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install Cartouche
        run: pip install cartouche-svg

      - name: Render light + dark variants
        env:
          # Use a PERSONAL ACCESS TOKEN, not the default secrets.GITHUB_TOKEN.
          # A profile dashboard aggregates stargazer timelines across ALL of
          # your repos (cross-repo reads). The default GITHUB_TOKEN is a GitHub
          # App installation token, and GitHub returns 403 "Resource not
          # accessible by integration" when it reads another repo's
          # /stargazers — so the star history silently comes back empty. A PAT
          # is not an integration and can read them (it also covers the GraphQL
          # contribution calendar). Create a classic PAT with `public_repo` +
          # `read:user` (or `repo` to include private repos) and store it as a
          # repository secret named CARTOUCHE_PAT.
          GITHUB_TOKEN: ${{ secrets.CARTOUCHE_PAT }}
          # Pass identity via env (not ${{ }} interpolation in `run:`) so
          # that the bash script never embeds workflow-context values
          # directly. github.repository_owner is your handle when this
          # workflow runs in your profile repo.
          OWNER: ${{ github.repository_owner }}
        run: |
          mkdir -p assets
          cartouche profile "$OWNER" \
            --theme blueprint-light \
            --out assets/profile-light.svg
          cartouche profile "$OWNER" \
            --theme blueprint-dark \
            --out assets/profile-dark.svg

      - name: Commit if changed
        run: |
          if [[ -n $(git status --porcelain assets/) ]]; then
            git config user.name "cartouche-bot"
            git config user.email "cartouche-bot@users.noreply.github.com"
            git add assets/
            git commit -m "chore(cartouche): refresh profile dashboard"
            git push
          else
            echo "No dashboard changes."
          fi
