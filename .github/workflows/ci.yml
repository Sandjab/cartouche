# CI for Cartouche.
#
# No untrusted inputs are interpolated into `run:` steps — the only
# `${{ ... }}` expression used is `matrix.python-version`, which is a
# literal value defined by this file itself.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Defense in depth: lock GITHUB_TOKEN to read-only at the workflow level.
# No job in this workflow needs to write to the repo.
permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format (ruff format --check)
        run: ruff format --check .

      - name: Tests (pytest)
        run: pytest

      - name: Smoke test (CLI end-to-end with --mock)
        run: |
          set -e
          mkdir -p /tmp/smoke
          cartouche themes | grep -q drafting-light
          cartouche langs  | grep -q '^en$'
          cartouche repo Sandjab/cartouche --mock --theme blueprint-light \
            --out /tmp/smoke/repo.svg
          cartouche profile Sandjab --mock --lang fr --theme vellum-davinci-light \
            --out /tmp/smoke/profile.svg
          for f in /tmp/smoke/repo.svg /tmp/smoke/profile.svg; do
            test -s "$f"
            head -1 "$f" | grep -q '<svg'
            tail -1 "$f" | grep -q '</svg>'
          done

  build-wheel:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify packaged resources (py.typed + lang JSON + watermark PNG)
        run: |
          set -e
          wheel=$(ls dist/cartouche_svg-*.whl | head -1)
          echo "Inspecting $wheel"
          contents=$(python -m zipfile -l "$wheel")
          echo "$contents"
          for f in cartouche/py.typed \
                   cartouche/lang/en.json cartouche/lang/fr.json \
                   cartouche/watermarks/davinci.png \
                   cartouche/watermarks/floral.png \
                   cartouche/watermarks/kawai.png; do
            echo "$contents" | grep -q "$f" || { echo "MISSING in wheel: $f"; exit 1; }
          done

      - name: Smoke install from sdist (cold-pip simulation)
        run: |
          set -e
          python -m venv /tmp/sdist-venv
          /tmp/sdist-venv/bin/pip install --quiet dist/cartouche_svg-*.tar.gz
          /tmp/sdist-venv/bin/cartouche --version
          /tmp/sdist-venv/bin/cartouche themes | grep -q drafting-light
          /tmp/sdist-venv/bin/cartouche repo Sandjab/cartouche --mock \
            --theme blueprint-light --out /tmp/from-sdist.svg
          test -s /tmp/from-sdist.svg
          head -1 /tmp/from-sdist.svg | grep -q '<svg'

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/
