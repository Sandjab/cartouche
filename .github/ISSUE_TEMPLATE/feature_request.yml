name: Feature request
description: Suggest a new capability, theme, or improvement.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new theme, a new figure on the dashboard,
        another language pack, or a quality-of-life improvement?
        Sketch the use case here.
  - type: textarea
    id: problem
    attributes:
      label: Problem you're trying to solve
      description: |
        What are you trying to do that Cartouche makes hard or
        impossible today? (Even if you already have a solution in mind,
        starting from the user-facing problem makes the discussion
        more productive.)
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Optional, but very welcome — sketch what you'd like the API or output to look like.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or designs you ruled out.
  - type: textarea
    id: context
    attributes:
      label: Anything else?
